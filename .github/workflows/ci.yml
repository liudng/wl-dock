name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [debian-13, fedora-42]
        arch: [x86_64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            build-${{ matrix.os }}-${{ matrix.arch }}
          key: ${{ runner.os }}-build-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build in container
        run: |
          set -euo pipefail
          case "${{ matrix.os }}" in
            debian-13)
              image=debian:trixie
              ;;
            fedora-42)
              image=fedora:42
              ;;
            *)
              echo "Unsupported OS: ${{ matrix.os }}"
              exit 1
              ;;
          esac

          build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
          docker run --rm --platform=linux/${{ matrix.arch }} -e BUILD_DIR="$build_dir" -v "$PWD:/workspace" -w /workspace "$image" bash -lc '
            set -euo pipefail
            if grep -qi "debian" /etc/os-release; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends build-essential cmake pkgconf qt6-base-dev qt6-wayland-dev wayland-protocols liblayershellqtinterface-dev
            else
              dnf --setopt=install_weak_deps=False -y install gcc-c++ cmake pkgconf qt6-qtbase-devel qt6-qtwayland-devel wayland-protocols-devel layer-shell-qt-devel
            fi
            mkdir -p "$BUILD_DIR"
            cd "$BUILD_DIR"
            cmake -DCMAKE_BUILD_TYPE=Release ..
            cmake --build . -- -j$(nproc)
          '

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wl-dock-${{ matrix.os }}-${{ matrix.arch }}
          path: build-${{ matrix.os }}-${{ matrix.arch }}/wl-dock
