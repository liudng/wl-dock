name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    # arm64 直接使用 GitHub 原生 ARM64 runner，避免 QEMU 模拟导致性能下降 5-20 倍。
    # amd64 仍用标准 x86_64 runner。两者都在容器内编译以保证依赖版本一致
    # （Runner 自带的 Ubuntu 24.04 中部分依赖库版本过旧）。
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: debian-13
            arch: amd64
            runner: ubuntu-latest
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:debian-trixie
          - os: debian-13
            arch: arm64
            runner: ubuntu-24.04-arm
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:debian-trixie
          - os: fedora-42
            arch: amd64
            runner: ubuntu-latest
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:fedora-42
          - os: fedora-42
            arch: arm64
            runner: ubuntu-24.04-arm
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:fedora-42

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          # 缓存目录挂载到容器的 /root/.ccache（Dockerfile 中 CCACHE_DIR）
          path: /tmp/ccache
          # 按 os+arch 隔离缓存，再以 commit sha 创建新条目；
          # restore-keys 命中同 os+arch 最近一次的缓存作为兜底
          key: ccache-${{ matrix.os }}-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Build in container
        run: |
          set -euo pipefail
          build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
          # docker pull 会根据 runner 架构自动拉取对应镜像（多架构镜像已由 build-image.yml 构建推送）
          docker pull "${{ matrix.builder }}"
          mkdir -p /tmp/ccache
          docker run --rm \
            -e BUILD_DIR="$build_dir" \
            -v "$PWD:/workspace" \
            -v "/tmp/ccache:/root/.ccache" \
            -w /workspace "${{ matrix.builder }}" bash -lc '
              set -euo pipefail
              mkdir -p "$BUILD_DIR"
              cd "$BUILD_DIR"
              cmake -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                    ..
              cmake --build . -- -j$(nproc)
              ccache --show-stats
            '
