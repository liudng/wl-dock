name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [debian-13, fedora-42]
        arch: [x86_64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build in container
        run: |
          set -euo pipefail
          case "${{ matrix.os }}" in
            debian-13)
              image=debian:trixie
              ;;
            fedora-42)
              image=fedora:42
              ;;
            *)
              echo "Unsupported OS: ${{ matrix.os }}"
              exit 1
              ;;
          esac
          build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
          tag_name="${GITHUB_REF#refs/tags/}"
          docker run --rm --platform=linux/${{ matrix.arch }} -e BUILD_DIR="$build_dir" -e TAG_NAME="$tag_name" -v "$PWD:/workspace" -w /workspace "$image" bash -lc '
            set -euo pipefail
            if grep -qi "debian" /etc/os-release; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential cmake pkgconf qt6-base-dev qt6-wayland-dev wayland-protocols liblayershellqtinterface-dev
            else
              dnf -y install gcc-c++ cmake pkgconf qt6-qtbase-devel qt6-qtwayland-devel wayland-protocols-devel layer-shell-qt-devel
            fi
            mkdir -p "$BUILD_DIR"
            cd "$BUILD_DIR"
            cmake -DCMAKE_BUILD_TYPE=Release ..
            cmake --build . -- -j$(nproc)
            tar czf "/workspace/wl-dock-${{ matrix.os }}-${{ matrix.arch }}-${TAG_NAME}.tar.gz" wl-dock
          '

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wl-dock-${{ matrix.os }}-${{ matrix.arch }}
          path: wl-dock-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' file; do
            echo "Uploading $file"
            gh release upload "${GITHUB_REF#refs/tags/}" "$file" --clobber
          done
