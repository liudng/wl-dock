name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: debian-13
            arch: amd64
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:debian-trixie
          - os: debian-13
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:debian-trixie
          - os: fedora-42
            arch: amd64
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:fedora-42
          - os: fedora-42
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:fedora-42

    steps:
      - uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            build-${{ matrix.os }}-${{ matrix.arch }}
          key: ${{ runner.os }}-build-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Restore ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.arch }}-

      - name: Set up QEMU for arm64
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build in container
        run: |
          set -euo pipefail
          docker pull "${{ matrix.builder }}"
          docker run --rm --platform=linux/${{ matrix.arch }} \
            -v "${{ github.workspace }}":/github/workspace \
            -v "${HOME}/.ccache":/root/.ccache \
            -w /github/workspace \
            "${{ matrix.builder }}" \
            bash -lc 'set -euo pipefail
              build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
              mkdir -p "$HOME/.ccache"
              mkdir -p "$build_dir"
              cd "$build_dir"
              cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ..
              ninja -j$(nproc)
              tag_name="${GITHUB_REF#refs/tags/}"
              tar czf "/github/workspace/wl-dock-${{ matrix.os }}-${{ matrix.arch }}-${tag_name}.tar.gz" wl-dock'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wl-dock-${{ matrix.os }}-${{ matrix.arch }}
          path: wl-dock-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          working_directory: artifacts
          files: |
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
