name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: debian-13
            arch: x86_64
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:debian-trixie
          - os: debian-13
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:debian-trixie
          - os: fedora-42
            arch: x86_64
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:fedora-42
          - os: fedora-42
            arch: arm64
            builder: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:fedora-42

    container:
      image: ${{ matrix.builder }}
      options: --platform=linux/${{ matrix.arch }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            build-${{ matrix.os }}-${{ matrix.arch }}
          key: ${{ runner.os }}-build-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Restore ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.arch }}-

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build in container
        run: |
          set -euo pipefail
          build_dir=build-${{ matrix.os }}-${{ matrix.arch }}
          tag_name="${GITHUB_REF#refs/tags/}"
          mkdir -p "$HOME/.ccache"
          mkdir -p "$build_dir"
          cd "$build_dir"
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ..
          ninja -j$(nproc)
          tar czf "/github/workspace/wl-dock-${{ matrix.os }}-${{ matrix.arch }}-${TAG_NAME}.tar.gz" wl-dock

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wl-dock-${{ matrix.os }}-${{ matrix.arch }}
          path: wl-dock-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          working_directory: artifacts
          files: |
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
