name: Build Builder Images

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-images:
    name: Build and push builder images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Debian builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.debian-trixie
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:debian-trixie

      - name: Build and push Fedora builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.fedora-42
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/wl-dock-builder:fedora-42
